const toSGD=(a,cur,rt,mo)=>a*getRate(rt,cur,mo);

const toBase=(a,cur,base,rt,mo)=>{const s=toSGD(a,cur,rt,mo);return base==="SGD"?s:base==="CNY"?s/getRate(rt,"CNY",mo):base==="GBP"?s/1.72:base==="USD"?s/1.35:s;};

const calcBal=(id,txns)=>txns.reduce((s,t)=>{
  if(t.type==="adjust"&&t.acctId===id)return s+t.amount;
  if(t.type==="transfer")return t.acctId===id?s-t.amount:t.toAcctId===id?s+(t.toAmount||t.amount):s;
  if(t.acctId===id)return t.type==="income"?s+t.amount:t.type==="expense"?s-t.amount:s;
  return s;
},0);

function detectCurrency(name){
  const n=(name||"").toUpperCase();
  if(n.includes("英镑")||n.includes("GBP"))return "GBP";
  if(n.includes("USD")||n.includes("美元"))return "USD";
  if(SG_KEYS.some(k=>n.includes(k))||n.startsWith("SG "))return "SGD";
  return "CNY";
}
function guessAcctType(name){
  const n=(name||"").toLowerCase();
  if(n.startsWith("投资-")||n.startsWith("投资_"))return "investment";
  if(n.startsWith("负债-")||n.startsWith("负债_"))return "liability";
  if(n.startsWith("债权-")||n.startsWith("债权_"))return "receivable";
  if(n.startsWith("虚拟账户-")||n.startsWith("虚拟账户_")||n.startsWith("虚拟-"))return "virtual";
  if(n.includes("信用卡")||n.includes("credit")||n.includes("白条")||n.includes("花呗")||n.includes("借呗")||n.includes("拿去花")||n.includes("白金"))return "liability";
  if(n.includes("应收")||n.includes("债权"))return "receivable";
  if(n.includes("moomoo")||n.includes("证券")||n.includes("基金")||n.includes("etf")||n.includes("余额宝")||n.includes("理财")||n.includes("fullerton")||n.includes("定期")||n.includes("黄金")||n.includes("短债")||n.includes("朝朝")||n.includes("懒人"))return "investment";
  if(n.includes("支付宝")||n.includes("微信")||n.includes("grab")||n.includes("星巴克")||n.includes("荷包"))return "virtual";
  if(n.includes("现金"))return "cash";
  return "fund";
}
function parseCSVLine(line){
  const res=[];let cur="";let inQ=false;
  for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){inQ=!inQ;}else if(ch===','&&!inQ){res.push(cur);cur="";}else{cur+=ch;}}
  res.push(cur);
  return res.map(s=>s.trim().replace(/^"|"$/g,""));
}
function parseCSV(text){
  const lines=text.split('\n').filter(l=>l.trim());
  if(lines.length<2)return [];
  const hdrs=parseCSVLine(lines[0]);
  return lines.slice(1).map(line=>{const vals=parseCSVLine(line);const obj={};hdrs.forEach((h,i)=>{obj[h.trim()]=vals[i]||"";});return obj;}).filter(r=>r['交易类型']&&r['交易类型']!=='交易类型');
}

function DonutChart(p){
  const {data,total}=p;if(!data||!data.length)return null;
  const size=110,r=36,cx=55,cy=55,circ=2*Math.PI*r;let cum=0;
  const slices=data.map((d,i)=>{const pct=total>0?d.value/total:0;const offset=-(circ*cum-circ/4);const dash=circ*pct-1;cum+=pct;return ce("circle",{key:i,cx,cy,r,fill:"none",stroke:d.color||(CLR[i%CLR.length]),strokeWidth:14,strokeDasharray:Math.max(0,dash)+" "+circ,strokeDashoffset:offset});});
  return ce("div",{style:{display:"flex",alignItems:"center",gap:14,padding:"4px 0"}},
    ce("svg",{width:size,height:size,style:{flexShrink:0}},ce("circle",{cx,cy,r,fill:"none",stroke:"var(--bg3)",strokeWidth:14}),...slices),
    ce("div",{style:{flex:1,minWidth:0}},data.slice(0,6).map((d,i)=>ce("div",{key:i,style:{display:"flex",alignItems:"center",gap:5,marginBottom:3}},ce("div",{style:{width:7,height:7,borderRadius:2,background:d.color||(CLR[i%CLR.length]),flexShrink:0}}),ce("span",{style:{fontSize:11,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:"var(--text)"}},d.name),ce("span",{style:{fontSize:11,color:"var(--text2)",flexShrink:0}},total>0?(d.value/total*100).toFixed(0)+"%":""))))
  );
}
function BarChart(p){
  const {data}=p;if(!data||!data.length)return null;
  const max=Math.max(...data.map(d=>Math.max(d.income||0,d.expense||0)),1);
  return ce("div",{style:{paddingTop:4}},
    ce("div",{style:{display:"flex",gap:10,marginBottom:8,fontSize:11}},ce("div",{style:{display:"flex",alignItems:"center",gap:4}},ce("div",{style:{width:8,height:8,borderRadius:2,background:GG}}),ce("span",{style:{color:"var(--text2)"}},"收入")),ce("div",{style:{display:"flex",alignItems:"center",gap:4}},ce("div",{style:{width:8,height:8,borderRadius:2,background:RR}}),ce("span",{style:{color:"var(--text2)"}},"支出"))),
    ce("div",{style:{display:"flex",alignItems:"flex-end",gap:3,height:120,overflowX:"auto",paddingBottom:18,borderBottom:"1px solid var(--bd)"}},

    )
  );
}
