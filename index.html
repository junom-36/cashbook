<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Cashbook</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;}
input,select,button{font-family:inherit;}
:root{--bg:#fff;--bg2:#f5f5f7;--bg3:#e8e8ed;--text:#1a1a1a;--text2:#6b7280;--bd:#e5e7eb;--bd2:#d1d5db;}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--text:#f2f2f7;--text2:#8e8e93;--bd:#3a3a3c;--bd2:#48484a;}body{background:#000;}}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#888">加载中…</div></div>
<script>
const {useState,useEffect,useMemo,createElement:ce,Fragment}=React;

// ── Data ──────────────────────────────────────────────────────────
const CATS=[
  {id:"food",name:"食品酒水",color:"#e2725b",sub:["早午晚餐","咖啡","酒","蔬菜水果","水饮零食"]},
  {id:"transport",name:"行车交通",color:"#d4a017",sub:["公共交通","打车租车","加班打车","私家车费用"]},
  {id:"shopping",name:"服饰美容",color:"#7c6fcd",sub:["服饰","鞋子","包包","饰品","护肤化妆","美发造型"]},
  {id:"housing",name:"房租水电",color:"#2e9b8f",sub:["房租","水电煤气","上网费","手机话费"]},
  {id:"daily",name:"日常家居",color:"#5b9e7c",sub:["日常用品","快消品","设备电器"]},
  {id:"entertainment",name:"休闲娱乐",color:"#c45689",sub:["旅游度假","生活娱乐","运动健身","微信红包"]},
  {id:"education",name:"学习进修",color:"#e8803a",sub:["学习培训","书报杂志","文具用品"]},
  {id:"health",name:"医疗保健",color:"#4a9e5c",sub:["医疗费用","保健费"]},
  {id:"social",name:"人情往来",color:"#9b6fcd",sub:["送礼请客","孝敬家长"]},
  {id:"finance",name:"金融保险",color:"#3a7fc1",sub:["保险","各类税务","银行手续"]},
  {id:"other",name:"其他杂项",color:"#8a8a8a",sub:["其他支出","快递运费"]},
];
const ICATS=[
  {id:"salary",name:"职业收入",sub:["工资收入","奖金收入","报销费用"]},
  {id:"fin_in",name:"理财收入",sub:["投资利息","闲置出售"]},
  {id:"other_in",name:"其他收入",sub:["各种退款","抢红包","账户利息"]},
];
const ALAB={cash:"现金",fund:"资金账户",virtual:"虚拟账户",liability:"信用卡/负债",receivable:"债权账户",investment:"投资账户"};
const CLR=["#7c6fcd","#d4a017","#e2725b","#4a9e5c","#2e9b8f","#c45689","#3a7fc1","#8a8a8a","#e8803a","#9b6fcd"];
const DEFRTS={"2026-04":0.185,"2026-03":0.186,"2026-02":0.184,"2026-01":0.185};
const DAYS=["周日","周一","周二","周三","周四","周五","周六"];
const SYMS={SGD:"S$",CNY:"¥",GBP:"£",USD:"US$"};
const PP="#7c6fcd",GG="#4a9e5c",RR="#e2725b";

// ── Helpers ───────────────────────────────────────────────────────
const gid=()=>Math.random().toString(36).slice(2,9);
const getRate=(rt,cur,mo)=>cur==="SGD"?1:cur==="GBP"?1.72:cur==="USD"?1.35:(rt[mo]||0.185);
const toSGD=(a,cur,rt,mo)=>a*getRate(rt,cur,mo);
const fmtA=(n,cur)=>(SYMS[cur]||"")+Math.abs(n).toLocaleString("en-SG",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtS=n=>"S$"+Math.abs(n).toLocaleString("en-SG",{minimumFractionDigits:0,maximumFractionDigits:0});
const toBase=(a,cur,base,rt,mo)=>{const s=toSGD(a,cur,rt,mo);return base==="SGD"?s:base==="CNY"?s/getRate(rt,"CNY",mo):base==="GBP"?s/1.72:base==="USD"?s/1.35:s;};
const fmtB=(n,base)=>(SYMS[base]||"S$")+Math.abs(n).toLocaleString("en-SG",{minimumFractionDigits:0,maximumFractionDigits:0});
const fmtDt=ds=>{const d=new Date(ds+"T00:00:00");return d.getFullYear()+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日 "+DAYS[d.getDay()];};
const nowDT=()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")+"T"+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");};
const curMo=()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");};
const calcBal=(id,txns)=>txns.reduce((s,t)=>{
  if(t.type==="adjust"&&t.acctId===id)return s+t.amount;
  if(t.type==="transfer")return t.acctId===id?s-t.amount:t.toAcctId===id?s+(t.toAmount||t.amount):s;
  if(t.acctId===id)return t.type==="income"?s+t.amount:t.type==="expense"?s-t.amount:s;
  return s;
},0);

// ── Style helpers ─────────────────────────────────────────────────
const IPT={padding:"10px 12px",border:"0.5px solid var(--bd2)",borderRadius:8,fontSize:14,outline:"none",background:"var(--bg)",color:"var(--text)",width:"100%",boxSizing:"border-box"};
const SM={padding:"6px 8px",border:"0.5px solid var(--bd2)",borderRadius:8,fontSize:12,outline:"none",background:"var(--bg)",color:"var(--text)",width:"100%",boxSizing:"border-box"};
const CARD={background:"var(--bg)",border:"0.5px solid var(--bd)",borderRadius:12,padding:"14px 16px",marginBottom:10};

// ── UI Components ─────────────────────────────────────────────────
function Lbl(p){return ce("div",{style:{fontSize:12,color:"var(--text2)",marginBottom:5,fontWeight:500}},p.children);}
function Btn(p){return ce("button",{onClick:p.onClick,style:{padding:"11px",border:"none",borderRadius:10,background:p.color||PP,color:"white",fontSize:14,fontWeight:500,cursor:"pointer",...(p.style||{})}},p.children);}
function Num(p){return ce("span",null,p.vis?p.v:"••••");}
function Eye(p){
  return p.open
    ?ce("svg",{width:18,height:18,viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round"},ce("path",{d:"M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"}),ce("circle",{cx:12,cy:12,r:3}))
    :ce("svg",{width:18,height:18,viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round"},ce("path",{d:"M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"}),ce("path",{d:"M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"}),ce("line",{x1:1,y1:1,x2:23,y2:23}));
}

// ── CSS Charts ────────────────────────────────────────────────────
function DonutChart(p){
  const {data,total}=p;
  if(!data||!data.length)return null;
  const size=110,r=36,cx=55,cy=55,circ=2*Math.PI*r;
  let cum=0;
  const slices=data.map((d,i)=>{
    const pct=total>0?d.value/total:0;
    const offset=-(circ*cum-circ/4);
    const dash=circ*pct-1;
    cum+=pct;
    return ce("circle",{key:i,cx,cy,r,fill:"none",stroke:d.color||(CLR[i%CLR.length]),strokeWidth:14,strokeDasharray:Math.max(0,dash)+" "+circ,strokeDashoffset:offset});
  });
  return ce("div",{style:{display:"flex",alignItems:"center",gap:14,padding:"4px 0"}},
    ce("svg",{width:size,height:size,style:{flexShrink:0}},
      ce("circle",{cx,cy,r,fill:"none",stroke:"var(--bg3)",strokeWidth:14}),
      ...slices
    ),
    ce("div",{style:{flex:1,minWidth:0}},
      data.slice(0,6).map((d,i)=>ce("div",{key:i,style:{display:"flex",alignItems:"center",gap:5,marginBottom:3}},
        ce("div",{style:{width:7,height:7,borderRadius:2,background:d.color||(CLR[i%CLR.length]),flexShrink:0}}),
        ce("span",{style:{fontSize:11,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:"var(--text)"}},d.name),
        ce("span",{style:{fontSize:11,color:"var(--text2)",flexShrink:0}},total>0?(d.value/total*100).toFixed(0)+"%":"")
      ))
    )
  );
}
function BarChart(p){
  const {data}=p;
  if(!data||!data.length)return null;
  const max=Math.max(...data.map(d=>Math.max(d.income||0,d.expense||0)),1);
  return ce("div",{style:{paddingTop:4}},
    ce("div",{style:{display:"flex",gap:10,marginBottom:8,fontSize:11}},
      ce("div",{style:{display:"flex",alignItems:"center",gap:4}},ce("div",{style:{width:8,height:8,borderRadius:2,background:GG}}),ce("span",{style:{color:"var(--text2)"}},"收入")),
      ce("div",{style:{display:"flex",alignItems:"center",gap:4}},ce("div",{style:{width:8,height:8,borderRadius:2,background:RR}}),ce("span",{style:{color:"var(--text2)"}},"支出"))
    ),
    ce("div",{style:{display:"flex",alignItems:"flex-end",gap:3,height:120,overflowX:"auto",paddingBottom:18,position:"relative",borderBottom:"1px solid var(--bd)"}},
      data.map((d,i)=>ce("div",{key:i,style:{display:"flex",flexDirection:"column",alignItems:"center",gap:2,minWidth:28,flex:1}},
        ce("div",{style:{display:"flex",alignItems:"flex-end",gap:2,height:100}},
          ce("div",{style:{width:9,borderRadius:"3px 3px 0 0",background:GG,height:Math.max(2,Math.round(d.income/max*96))+"px"}}),
          ce("div",{style:{width:9,borderRadius:"3px 3px 0 0",background:RR,height:Math.max(2,Math.round(d.expense/max*96))+"px"}})
        ),
        ce("div",{style:{fontSize:9,color:"var(--text2)",textAlign:"center",whiteSpace:"nowrap",marginTop:2}},d.month)
      ))
    )
  );
}

// ── App ───────────────────────────────────────────────────────────
function App(){
  const [page,setPage]=useState("home");
  const [prev,setPrev]=useState("home");
  const [accts,setAccts]=useState([]);
  const [txns,setTxns]=useState([]);
  const [rates,setRates]=useState(DEFRTS);
  const [loaded,setLoaded]=useState(false);
  const [mo,setMo]=useState(curMo);
  const [vis,setVis]=useState(true);
  const [base,setBase]=useState("SGD");
  const [aTab,setATab]=useState("cat");
  const [aMode,setAMode]=useState("month");
  const [aMo,setAMo]=useState(curMo);
  const [aYr,setAYr]=useState(new Date().getFullYear());
  const [aFrom,setAFrom]=useState(new Date().getFullYear()+"-01-01");
  const [aTo,setATo]=useState(new Date().getFullYear()+"-12-31");
  const [expCats,setExpCats]=useState(new Set());
  const IF0={type:"all",dateFrom:"",dateTo:"",catId:"",acctId:"",keyword:""};
  const [flt,setFlt]=useState(IF0);
  const [showFlt,setShowFlt]=useState(false);
  const [lim,setLim]=useState(80);
  const [editId,setEditId]=useState(null);
  const [editF,setEditF]=useState({});
  const [adjId,setAdjId]=useState(null);
  const [adjVal,setAdjVal]=useState("");
  const [editAId,setEditAId]=useState(null);
  const [editAF,setEditAF]=useState({});
  const [menuId,setMenuId]=useState(null);
  const [menuPos,setMenuPos]=useState({top:0,right:0});
  const [syncSt,setSyncSt]=useState("");
  const [lastSync,setLastSync]=useState("");
  const [aForm,setAForm]=useState({name:"",type:"fund",currency:"SGD"});
  const mkForm=()=>({type:"expense",datetime:nowDT(),amount:"",toAmount:"",acctId:accts[0]?accts[0].id:"",toAcctId:"",catId:"food",sub:"",note:""});
  const [form,setForm]=useState(()=>({type:"expense",datetime:nowDT(),amount:"",toAmount:"",acctId:"",toAcctId:"",catId:"food",sub:"",note:""}));

  // Computed
  const bals=useMemo(()=>{const m={};accts.forEach(a=>{m[a.id]=calcBal(a.id,txns);});return m;},[accts,txns]);
  const assets=useMemo(()=>accts.reduce((s,a)=>s+toBase(Math.max(0,bals[a.id]||0),a.currency,base,rates,mo),0),[accts,bals,base,rates,mo]);
  const liabs=useMemo(()=>accts.reduce((s,a)=>{const b=bals[a.id]||0;return b<0?s+toBase(Math.abs(b),a.currency,base,rates,mo):s;},0),[accts,bals,base,rates,mo]);
  const net=assets-liabs;
  const moTxns=useMemo(()=>txns.filter(t=>t.date.startsWith(mo)&&t.type!=="adjust"),[txns,mo]);
  const moInc=useMemo(()=>moTxns.filter(t=>t.type==="income").reduce((s,t)=>s+toBase(t.amount,t.currency,base,rates,mo),0),[moTxns,base,rates,mo]);
  const moExp=useMemo(()=>moTxns.filter(t=>t.type==="expense").reduce((s,t)=>s+toBase(t.amount,t.currency,base,rates,mo),0),[moTxns,base,rates,mo]);
  const aRange=useMemo(()=>{
    if(aMode==="month")return{from:aMo+"-01",to:aMo+"-31",label:aMo.replace("-","年")+"月"};
    if(aMode==="year")return{from:aYr+"-01-01",to:aYr+"-12-31",label:aYr+"年"};
    return{from:aFrom,to:aTo,label:aFrom+"~"+aTo};
  },[aMode,aMo,aYr,aFrom,aTo]);
  const aTxns=useMemo(()=>txns.filter(t=>t.type!=="adjust"&&t.date>=aRange.from&&t.date<=aRange.to),[txns,aRange]);
  const aInc=useMemo(()=>aTxns.filter(t=>t.type==="income").reduce((s,t)=>s+toSGD(t.amount,t.currency,rates,t.date.slice(0,7)),0),[aTxns,rates]);
  const aExp=useMemo(()=>aTxns.filter(t=>t.type==="expense").reduce((s,t)=>s+toSGD(t.amount,t.currency,rates,t.date.slice(0,7)),0),[aTxns,rates]);
  const catBD=useMemo(()=>{
    const m={};
    aTxns.filter(t=>t.type==="expense").forEach(t=>{
      const c=CATS.find(x=>x.id===t.catId);const k=c?c.id:"other";
      if(!m[k])m[k]={id:k,name:c?c.name:"其他",color:c?c.color:"#8a8a8a",value:0,subs:{}};
      const v=toSGD(t.amount,t.currency,rates,t.date.slice(0,7));
      m[k].value+=v;m[k].subs[t.sub||"其他"]=(m[k].subs[t.sub||"其他"]||0)+v;
    });
    return Object.values(m).map(x=>{
      const subArr=Object.entries(x.subs).map(e=>({name:e[0],value:+e[1].toFixed(2)})).sort((a,b)=>b.value-a.value);
      return Object.assign({},x,{value:+x.value.toFixed(2),subArr});
    }).sort((a,b)=>b.value-a.value);
  },[aTxns,rates]);
  const homeCBD=useMemo(()=>{
    const m={};
    moTxns.filter(t=>t.type==="expense").forEach(t=>{
      const c=CATS.find(x=>x.id===t.catId);const k=c?c.id:"other";
      if(!m[k])m[k]={name:c?c.name:"其他",color:c?c.color:"#8a8a8a",value:0};
      m[k].value+=toSGD(t.amount,t.currency,rates,mo);
    });
    return Object.values(m).map(x=>Object.assign({},x,{value:+x.value.toFixed(2)})).sort((a,b)=>b.value-a.value);
  },[moTxns,rates,mo]);
  const trendData=useMemo(()=>{
    const months=[];
    let cur=new Date(aRange.from.slice(0,7)+"-01");
    const end=new Date(aRange.to.slice(0,7)+"-01");
    while(cur<=end){months.push(cur.getFullYear()+"-"+String(cur.getMonth()+1).padStart(2,"0"));cur=new Date(cur.getFullYear(),cur.getMonth()+1,1);}
    return months.map(m=>({
      month:aMode==="year"?parseInt(m.slice(5))+"月":m.slice(5),
      income:+txns.filter(t=>t.date.startsWith(m)&&t.type==="income").reduce((s,t)=>s+toSGD(t.amount,t.currency,rates,m),0).toFixed(2),
      expense:+txns.filter(t=>t.date.startsWith(m)&&t.type==="expense").reduce((s,t)=>s+toSGD(t.amount,t.currency,rates,m),0).toFixed(2),
    }));
  },[txns,rates,aRange,aMode]);
  const fltTxns=useMemo(()=>txns.filter(t=>{
    if(flt.type!=="all"&&t.type!==flt.type)return false;
    if(t.type==="adjust"&&flt.type!=="adjust")return false;
    if(flt.dateFrom&&t.date<flt.dateFrom)return false;
    if(flt.dateTo&&t.date>flt.dateTo)return false;
    if(flt.catId&&t.catId!==flt.catId)return false;
    if(flt.acctId&&t.acctId!==flt.acctId&&t.toAcctId!==flt.acctId)return false;
    if(flt.keyword){const kw=flt.keyword.toLowerCase();const c=CATS.find(x=>x.id===t.catId);const a=accts.find(x=>x.id===t.acctId);if(![t.note,t.sub,c?c.name:"",a?a.name:""].join(" ").toLowerCase().includes(kw))return false;}
    return true;
  }),[txns,flt,accts]);
  const grpTxns=useMemo(()=>{
    const g={};
    fltTxns.slice(0,lim).forEach(t=>{if(!g[t.date])g[t.date]=[];g[t.date].push(t);});
    return Object.entries(g).sort((a,b)=>b[0].localeCompare(a[0])).map(e=>({
      date:e[0],txns:e[1],
      inc:e[1].filter(t=>t.type==="income").reduce((s,t)=>s+toSGD(t.amount,t.currency,rates,t.date.slice(0,7)),0),
      exp:e[1].filter(t=>t.type==="expense").reduce((s,t)=>s+toSGD(t.amount,t.currency,rates,t.date.slice(0,7)),0),
    }));
  },[fltTxns,lim,rates]);

  // Storage
  useEffect(()=>{
    try{const d=JSON.parse(localStorage.getItem("cb1")||"{}");if(d.accts)setAccts(d.accts);if(d.txns)setTxns(d.txns);if(d.rates)setRates(d.rates);if(d.base)setBase(d.base);if(d.vis!==undefined)setVis(d.vis);if(d.ls)setLastSync(d.ls);}catch(e){}
    setLoaded(true);
  },[]);
  useEffect(()=>{if(!loaded)return;try{localStorage.setItem("cb1",JSON.stringify({accts,txns,rates,base,vis,ls:lastSync}));}catch(e){};},[accts,txns,rates,base,vis,lastSync,loaded]);

  // Actions
  const nav=p=>{setPrev(page);setPage(p);};
  const addTxn=(data,keep)=>{
    setTxns(p=>[Object.assign({},data,{id:gid()}),...p]);
    if(keep)setForm(p=>Object.assign({},p,{datetime:nowDT(),amount:"",note:""}));
    else{setForm(mkForm());setPage(prev);}
  };
  const delTxn=id=>setTxns(p=>p.filter(t=>t.id!==id));
  const startEdit=t=>{setEditId(t.id);setEditF({type:t.type,date:t.date,amount:String(Math.abs(t.amount)),acctId:t.acctId,toAcctId:t.toAcctId||"",catId:t.catId||"",sub:t.sub||"",note:t.note||""});};
  const saveEdit=()=>{const amt=parseFloat(editF.amount);if(isNaN(amt)){setEditId(null);return;}setTxns(p=>p.map(t=>t.id!==editId?t:Object.assign({},t,{date:editF.date,amount:amt,acctId:editF.acctId,catId:editF.catId,sub:editF.sub,note:editF.note})));setEditId(null);};
  const adjBal=id=>{
    const a=accts.find(x=>x.id===id);if(!a)return;
    const target=parseFloat(adjVal);if(isNaN(target)){setAdjId(null);return;}
    const diff=+(target-(bals[id]||0)).toFixed(6);if(Math.abs(diff)<0.001){setAdjId(null);return;}
    setTxns(p=>[{id:gid(),date:new Date().toISOString().slice(0,10),type:"adjust",amount:diff,currency:a.currency,acctId:id,toAcctId:"",toAmount:0,catId:"",sub:"余额变更",note:"[余额调整]"},...p]);
    setAdjId(null);setAdjVal("");
  };
  const syncRates=async()=>{
    setSyncSt("ing");
    try{const r=await fetch("https://api.frankfurter.app/latest?from=CNY&to=SGD");const d=await r.json();const rate=d.rates&&d.rates.SGD;if(!rate)throw 0;const m=d.date.slice(0,7);setRates(p=>Object.assign({},p,{[m]:+rate.toFixed(4)}));setLastSync(new Date().toLocaleString("zh-CN",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"}));setSyncSt("ok");}
    catch(e){setSyncSt("err");}
    setTimeout(()=>setSyncSt(""),3000);
  };
  const exportJSON=()=>{const b=new Blob([JSON.stringify({accts,txns,rates},null,2)],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="cashbook_backup.json";a.click();URL.revokeObjectURL(u);};

            {l:"删除",fn:()=>{if(tc>0){alert("有关联流水，无法删除");return;}setAccts(p=>p.filter(x=>x.id!==a.id));setMenuId(null);},danger:true,disabled:tc>0},
          ].map((item,i)=>ce("button",{key:item.l,onClick:item.disabled?undefined:item.fn,style:{display:"block",width:"100%",padding:"12px 16px",border:"none",borderBottom:i<2?"0.5px solid var(--bd)":"none",background:"var(--bg)",textAlign:"left",fontSize:14,color:item.disabled?"var(--bd2)":item.danger?RR:"var(--text)",cursor:item.disabled?"not-allowed":"pointer"}},item.l))
