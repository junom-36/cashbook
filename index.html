<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Cashbook 记账</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/recharts@2.8.0/umd/Recharts.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f7;}
:root{--bg:#fff;--bg2:#f5f5f7;--bg3:#e8e8ed;--text:#1a1a1a;--text2:#6b7280;--border:#e5e7eb;--border2:#d1d5db;}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--text:#f2f2f7;--text2:#8e8e93;--border:#3a3a3c;--border2:#48484a;}body{background:#000;}}
input,select,button{font-family:inherit;}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;font-size:14px;color:#666;">加载中…</div></div>
<script>
// Wait for all scripts to load
window.addEventListener('load', function() {
  try { init(); } catch(e) { document.getElementById('root').innerHTML = '<div style="padding:20px;color:red;">错误: ' + e.message + '</div>'; }
});

function init() {
const {useState,useEffect,useMemo,createElement:h,Fragment}=React;
const {PieChart,Pie,Cell,BarChart,Bar,XAxis,YAxis,Tooltip,ResponsiveContainer,Legend}=Recharts;

const CATS=[
  {id:"food",name:"食品酒水",color:"#e2725b",sub:["早午晚餐","咖啡","酒","蔬菜水果","水饮零食"]},
  {id:"transport",name:"行车交通",color:"#d4a017",sub:["公共交通","打车租车","加班打车","私家车费用"]},
  {id:"shopping",name:"服饰美容",color:"#7c6fcd",sub:["服饰","鞋子","包包","饰品","护肤化妆","美发造型","spa"]},
  {id:"housing",name:"房租水电",color:"#2e9b8f",sub:["房租","水电煤气","上网费","手机话费","维修保养"]},
  {id:"daily",name:"日常家居",color:"#5b9e7c",sub:["日常用品","快消品","设备电器"]},
  {id:"entertainment",name:"休闲娱乐",color:"#c45689",sub:["旅游度假","生活娱乐","腐败聚会","运动健身","微信红包"]},
  {id:"education",name:"学习进修",color:"#e8803a",sub:["学习培训","书报杂志","文具用品","电子App"]},
  {id:"health",name:"医疗保健",color:"#4a9e5c",sub:["医疗费用","保健费","美容费"]},
  {id:"social",name:"人情往来",color:"#9b6fcd",sub:["送礼请客","孝敬家长"]},
  {id:"finance",name:"金融保险",color:"#3a7fc1",sub:["保险","各类税务","银行手续"]},
  {id:"other",name:"其他杂项",color:"#8a8a8a",sub:["其他支出","快递运费"]},
];
const INC_CATS=[
  {id:"salary",name:"职业收入",sub:["工资收入","奖金收入","报销费用"]},
  {id:"finance_in",name:"理财收入",sub:["投资利息","闲置出售"]},
  {id:"other_in",name:"其他收入",sub:["各种退款","经营所得","抢红包","账户利息"]},
];
const ACCT_LABELS={cash:"现金",fund:"资金账户",virtual:"虚拟账户",liability:"信用卡/负债",receivable:"债权账户",investment:"投资账户"};
const COLORS=["#7c6fcd","#d4a017","#e2725b","#4a9e5c","#2e9b8f","#c45689","#3a7fc1","#8a8a8a","#e8803a","#9b6fcd","#5b9e7c","#c0392b"];
const DEF_RATES={"2026-04":0.185,"2026-03":0.186,"2026-02":0.184,"2026-01":0.185};
const DAYS=["周日","周一","周二","周三","周四","周五","周六"];
const SYMS={SGD:"S$",CNY:"¥",GBP:"£",USD:"US$"};
const P="#7c6fcd",G="#4a9e5c",R="#e2725b";

const gid=()=>Math.random().toString(36).slice(2,9);
const getRate=(rates,cur,mo)=>cur==="SGD"?1:cur==="GBP"?1.72:cur==="USD"?1.35:(rates[mo]||0.185);
const toSGD=(amt,cur,rates,mo)=>amt*getRate(rates,cur,mo);
const fmtAmt=(n,cur)=>(SYMS[cur]||"")+Math.abs(n).toLocaleString("en-SG",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtSGD=n=>"S$"+Math.abs(n).toLocaleString("en-SG",{minimumFractionDigits:0,maximumFractionDigits:0});
const toBase=(amt,cur,base,rates,mo)=>{const s=toSGD(amt,cur,rates,mo);return base==="SGD"?s:base==="CNY"?s/getRate(rates,"CNY",mo):base==="GBP"?s/1.72:base==="USD"?s/1.35:s;};
const fmtBase=(n,base)=>(SYMS[base]||"S$")+Math.abs(n).toLocaleString("en-SG",{minimumFractionDigits:0,maximumFractionDigits:0});
const fmtDate=ds=>{const d=new Date(ds+"T00:00:00");return d.getFullYear()+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日 "+DAYS[d.getDay()];};
const nowDT=()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")+"T"+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");};
const calcBal=(id,txns)=>txns.reduce((s,t)=>{
  if(t.type==="adjust"&&t.acctId===id)return s+t.amount;
  if(t.type==="transfer")return t.acctId===id?s-t.amount:t.toAcctId===id?s+(t.toAmount||t.amount):s;
  if(t.acctId===id)return t.type==="income"?s+t.amount:t.type==="expense"?s-t.amount:s;
  return s;
},0);

const IPT={padding:"10px 12px",border:"0.5px solid var(--border2)",borderRadius:8,fontSize:14,outline:"none",background:"var(--bg)",color:"var(--text)",width:"100%",boxSizing:"border-box"};
const CARD={background:"var(--bg)",border:"0.5px solid var(--border)",borderRadius:12,padding:"14px 16px",marginBottom:10};
const SM={padding:"6px 8px",border:"0.5px solid var(--border2)",borderRadius:8,fontSize:12,outline:"none",background:"var(--bg)",color:"var(--text)",width:"100%",boxSizing:"border-box"};

function Lbl({children}){return h("div",{style:{fontSize:12,color:"var(--text2)",marginBottom:5,fontWeight:500}},children);}
function Btn({onClick,color,style,children}){return h("button",{onClick,style:{padding:"11px",border:"none",borderRadius:10,background:color||P,color:"white",fontSize:14,fontWeight:500,cursor:"pointer",...style}},children);}
function Num({v,vis}){return h("span",null,vis?v:"••••");}
function Eye({open}){
  if(open)return h("svg",{width:18,height:18,viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round"},
    h("path",{d:"M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"}),h("circle",{cx:12,cy:12,r:3}));
  return h("svg",{width:18,height:18,viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round"},
    h("path",{d:"M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"}),
    h("path",{d:"M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"}),
    h("line",{x1:1,y1:1,x2:23,y2:23}));
}

function App(){
  const [page,setPage]=useState("home");
  const [prev,setPrev]=useState("home");
  const [accts,setAccts]=useState([]);
  const [txns,setTxns]=useState([]);
  const [rates,setRates]=useState(DEF_RATES);
  const [loaded,setLoaded]=useState(false);
  const curMo=()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");};
  const [mo,setMo]=useState(curMo);
  const [vis,setVis]=useState(true);
  const [base,setBase]=useState("SGD");
  const [aTab,setATab]=useState("cat");
  const [aMode,setAMode]=useState("month");
  const [aMo,setAMo]=useState(curMo);
  const [aYr,setAYr]=useState(new Date().getFullYear());
  const [aFrom,setAFrom]=useState("2026-01-01");
  const [aTo,setATo]=useState("2026-12-31");
  const [expCats,setExpCats]=useState(new Set());
  const IFLT={type:"all",dateFrom:"",dateTo:"",catId:"",acctId:"",keyword:""};
  const [flt,setFlt]=useState(IFLT);
  const [showFlt,setShowFlt]=useState(false);
  const [lim,setLim]=useState(100);
  const [editId,setEditId]=useState(null);
  const [editF,setEditF]=useState({});
  const [adjId,setAdjId]=useState(null);
  const [adjVal,setAdjVal]=useState("");
  const [editAId,setEditAId]=useState(null);
  const [editAF,setEditAF]=useState({});
  const [menuId,setMenuId]=useState(null);
  const [menuPos,setMenuPos]=useState({top:0,right:0});
  const [syncSt,setSyncSt]=useState("");
  const [lastSync,setLastSync]=useState("");
  const mkForm=()=>({type:"expense",datetime:nowDT(),amount:"",toAmount:"",acctId:accts[0]?accts[0].id:"",toAcctId:"",catId:"food",sub:"",note:""});
  const [form,setForm]=useState(()=>({type:"expense",datetime:nowDT(),amount:"",toAmount:"",acctId:"",toAcctId:"",catId:"food",sub:"",note:""}));
  const [aForm,setAForm]=useState({name:"",type:"fund",currency:"SGD"});

  const bals=useMemo(()=>{const m={};accts.forEach(a=>{m[a.id]=calcBal(a.id,txns);});return m;},[accts,txns]);
  const assets=useMemo(()=>accts.reduce((s,a)=>s+toBase(Math.max(0,bals[a.id]||0),a.currency,base,rates,mo),0),[accts,bals,base,rates,mo]);
  const liabs=useMemo(()=>accts.reduce((s,a)=>{const b=bals[a.id]||0;return b<0?s+toBase(Math.abs(b),a.currency,base,rates,mo):s;},0),[accts,bals,base,rates,mo]);
  const net=assets-liabs;
  const moTxns=useMemo(()=>txns.filter(t=>t.date.startsWith(mo)&&t.type!=="adjust"),[txns,mo]);
  const moInc=useMemo(()=>moTxns.filter(t=>t.type==="income").reduce((s,t)=>s+toBase(t.amount,t.currency,base,rates,mo),0),[moTxns,base,rates,mo]);
  const moExp=useMemo(()=>moTxns.filter(t=>t.type==="expense").reduce((s,t)=>s+toBase(t.amount,t.currency,base,rates,mo),0),[moTxns,base,rates,mo]);
  const aRange=useMemo(()=>{
    if(aMode==="month")return{from:aMo+"-01",to:aMo+"-31",label:aMo.replace("-","年")+"月"};
    if(aMode==="year")return{from:aYr+"-01-01",to:aYr+"-12-31",label:aYr+"年"};
    return{from:aFrom,to:aTo,label:aFrom+"~"+aTo};
  },[aMode,aMo,aYr,aFrom,aTo]);
  const aTxns=useMemo(()=>txns.filter(t=>t.type!=="adjust"&&t.date>=aRange.from&&t.date<=aRange.to),[txns,aRange]);
  const aInc=useMemo(()=>aTxns.filter(t=>t.type==="income").reduce((s,t)=>s+toSGD(t.amount,t.currency,rates,t.date.slice(0,7)),0),[aTxns,rates]);
  const aExp=useMemo(()=>aTxns.filter(t=>t.type==="expense").reduce((s,t)=>s+toSGD(t.amount,t.currency,rates,t.date.slice(0,7)),0),[aTxns,rates]);

  const catBD=useMemo(()=>{
    const m={};
    aTxns.filter(t=>t.type==="expense").forEach(t=>{
      const c=CATS.find(x=>x.id===t.catId);const k=c?c.id:"other";
      if(!m[k])m[k]={id:k,name:c?c.name:"其他",color:c?c.color:"#8a8a8a",value:0,subs:{}};
      const v=toSGD(t.amount,t.currency,rates,t.date.slice(0,7));
      m[k].value+=v;m[k].subs[t.sub||"其他"]=(m[k].subs[t.sub||"其他"]||0)+v;
    });
    return Object.values(m).map(x=>{
      const subArr=Object.entries(x.subs).map(e=>({name:e[0],value:+e[1].toFixed(2)})).sort((a,b)=>b.value-a.value);
      return Object.assign({},x,{value:+x.value.toFixed(2),subArr});
    }).sort((a,b)=>b.value-a.value);
  },[aTxns,rates]);

  const homeCatBD=useMemo(()=>{
    const m={};
    moTxns.filter(t=>t.type==="expense").forEach(t=>{
      const c=CATS.find(x=>x.id===t.catId);const k=c?c.id:"other";
      if(!m[k])m[k]={name:c?c.name:"其他",color:c?c.color:"#8a8a8a",value:0};
      m[k].value+=toSGD(t.amount,t.currency,rates,mo);
    });
    return Object.values(m).map(x=>Object.assign({},x,{value:+x.value.toFixed(2)})).sort((a,b)=>b.value-a.value);
  },[moTxns,rates,mo]);

  const trendData=useMemo(()=>{
    const months=[];
    let cur=new Date(aRange.from.slice(0,7)+"-01");
    const end=new Date(aRange.to.slice(0,7)+"-01");
    while(cur<=end){months.push(cur.getFullYear()+"-"+String(cur.getMonth()+1).padStart(2,"0"));cur=new Date(cur.getFullYear(),cur.getMonth()+1,1);}
    return months.map(m=>({
      month:aMode==="year"?parseInt(m.slice(5))+"月":m,
      income:+txns.filter(t=>t.date.startsWith(m)&&t.type==="income").reduce((s,t)=>s+toSGD(t.amount,t.currency,rates,m),0).toFixed(2),
      expense:+txns.filter(t=>t.date.startsWith(m)&&t.type==="expense").reduce((s,t)=>s+toSGD(t.amount,t.currency,rates,m),0).toFixed(2),
    }));
  },[txns,rates,aRange,aMode]);

  const fltTxns=useMemo(()=>txns.filter(t=>{
    if(flt.type!=="all"&&t.type!==flt.type)return false;
    if(t.type==="adjust"&&flt.type!=="adjust")return false;
    if(flt.dateFrom&&t.date<flt.dateFrom)return false;
    if(flt.dateTo&&t.date>flt.dateTo)return false;
    if(flt.catId&&t.catId!==flt.catId)return false;
    if(flt.acctId&&t.acctId!==flt.acctId&&t.toAcctId!==flt.acctId)return false;
    if(flt.keyword){
      const kw=flt.keyword.toLowerCase();
      const c=CATS.find(x=>x.id===t.catId);
      const a=accts.find(x=>x.id===t.acctId);
      if(![t.note,t.sub,c?c.name:"",a?a.name:""].join(" ").toLowerCase().includes(kw))return false;
    }
    return true;
  }),[txns,flt,accts]);

  const grpTxns=useMemo(()=>{
    const g={};
    fltTxns.slice(0,lim).forEach(t=>{if(!g[t.date])g[t.date]=[];g[t.date].push(t);});
    return Object.entries(g).sort((a,b)=>b[0].localeCompare(a[0])).map(function(e){
      const date=e[0],ts=e[1];
      return{date,txns:ts,
        inc:ts.filter(t=>t.type==="income").reduce((s,t)=>s+toSGD(t.amount,t.currency,rates,t.date.slice(0,7)),0),
        exp:ts.filter(t=>t.type==="expense").reduce((s,t)=>s+toSGD(t.amount,t.currency,rates,t.date.slice(0,7)),0)
      };
    });
  },[fltTxns,lim,rates]);

  useEffect(()=>{
    try{
      const d=JSON.parse(localStorage.getItem("cashbook_v1")||"{}");
      if(d.accts)setAccts(d.accts);
      if(d.txns)setTxns(d.txns);
      if(d.rates)setRates(d.rates);
      if(d.base)setBase(d.base);
      if(d.vis!==undefined)setVis(d.vis);
      if(d.lastSync)setLastSync(d.lastSync);
    }catch(e){}
    setLoaded(true);
  },[]);

  useEffect(()=>{
    if(!loaded)return;
    try{localStorage.setItem("cashbook_v1",JSON.stringify({accts,txns,rates,base,vis,lastSync}));}catch(e){}
  },[accts,txns,rates,base,vis,lastSync,loaded]);

  const nav=p=>{setPrev(page);setPage(p);};
  const addTxn=(data,keep)=>{
    setTxns(p=>[Object.assign({},data,{id:gid()}),...p]);
    if(keep)setForm(p=>Object.assign({},p,{datetime:nowDT(),amount:"",note:""}));
    else{setForm(mkForm());setPage(prev);}
  };
  const delTxn=id=>setTxns(p=>p.filter(t=>t.id!==id));
  const startEdit=t=>{setEditId(t.id);setEditF({type:t.type,date:t.date,amount:String(Math.abs(t.amount)),acctId:t.acctId,toAcctId:t.toAcctId||"",catId:t.catId||"",sub:t.sub||"",note:t.note||""});};
  const saveEdit=()=>{
    const amt=parseFloat(editF.amount);if(isNaN(amt)){setEditId(null);return;}
    setTxns(p=>p.map(t=>t.id!==editId?t:Object.assign({},t,{date:editF.date,amount:amt,acctId:editF.acctId,toAcctId:editF.toAcctId,catId:editF.catId,sub:editF.sub,note:editF.note})));
    setEditId(null);
  };
  const adjBal=id=>{
    const a=accts.find(x=>x.id===id);if(!a)return;
    const cur=bals[id]||0,target=parseFloat(adjVal);if(isNaN(target)){setAdjId(null);return;}
    const diff=+(target-cur).toFixed(6);if(Math.abs(diff)<0.001){setAdjId(null);return;}
    setTxns(p=>[{id:gid(),date:new Date().toISOString().slice(0,10),type:"adjust",amount:diff,currency:a.currency,acctId:id,toAcctId:"",toAmount:0,catId:"",sub:"余额变更",note:"[余额调整]"},...p]);
    setAdjId(null);setAdjVal("");
  };
  const syncRates=async()=>{
    setSyncSt("syncing");
    try{
      const r=await fetch("https://api.frankfurter.app/latest?from=CNY&to=SGD");
      const d=await r.json();const rate=d.rates&&d.rates.SGD;if(!rate)throw 0;
      const m=d.date.slice(0,7);
      setRates(p=>Object.assign({},p,{[m]:+rate.toFixed(4)}));
      setLastSync(new Date().toLocaleString("zh-CN",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"}));
      setSyncSt("ok");
    }catch(e){setSyncSt("err");}
    setTimeout(()=>setSyncSt(""),3000);
  };
  const exportJSON=()=>{
    const b=new Blob([JSON.stringify({accts,txns,rates},null,2)],{type:"application/json"});
    const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="cashbook_backup.json";a.click();URL.revokeObjectURL(u);
  };
  const restoreJSON=file=>{
    const r=new FileReader();
    r.onload=e=>{try{const d=JSON.parse(e.target.result);if(d.accts)setAccts(d.accts);if(d.txns)setTxns(d.txns);if(d.rates)setRates(d.rates);alert("恢复成功！");}catch(err){alert("文件格式错误");}};
    r.readAsText(file);
  };

  const selAcct=accts.find(a=>a.id===form.acctId);
  const selToAcct=accts.find(a=>a.id===form.toAcctId);
  const crossCur=form.type==="transfer"&&selAcct&&selToAcct&&selAcct.currency!==selToAcct.currency;
  const isForm=page==="addTxn"||page==="addAcct";
  const aPrev=()=>{if(aMode==="month"){const p=aMo.split("-");const d=new Date(+p[0],+p[1]-2,1);setAMo(d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"));}else setAYr(y=>y-1);};
  const aNext=()=>{if(aMode==="month"){const p=aMo.split("-");const d=new Date(+p[0],+p[1],1);setAMo(d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"));}else setAYr(y=>y+1);};

  function TxnRow(props){
    const t=props.t;
    const cat=CATS.find(c=>c.id===t.catId);
    const acct=accts.find(a=>a.id===t.acctId);
    const toAcct=accts.find(a=>a.id===t.toAcctId);
    const isInc=t.type==="income",isXfer=t.type==="transfer",isAdj=t.type==="adjust";
    const posAdj=isAdj&&t.amount>0;
    const clr=(isInc||posAdj)?G:isXfer?P:R;
    const iconBg=isXfer?P:isAdj?"#888":isInc?G:(cat?cat.color:"#8a8a8a");
    const iconCh=isXfer?"⇄":isAdj?"±":isInc?"收":(cat?cat.name.slice(0,1):"?");
    const incCat=INC_CATS.find(c=>c.id===t.catId);
    const catLabel=isXfer?"转账":isAdj?(t.amount>0?"余额+":"余额-"):isInc?(incCat?incCat.name:t.sub||"收入"):(cat?(cat.name+(t.sub?" · "+t.sub:"")):"");
    const catClr=isXfer?P:isAdj?"#888":isInc?G:(cat?cat.color:"#8a8a8a");
    const sign=(isInc||posAdj)?"+":isXfer?"⇄":"-";

    if(editId===t.id){
      const eCat=CATS.find(c=>c.id===editF.catId);
      return h("div",{style:{padding:"12px 0",borderBottom:"0.5px solid var(--border)"}},
        h("div",{style:{fontSize:12,fontWeight:500,color:P,marginBottom:8}},"编辑流水"),
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}},
          h("div",null,h(Lbl,null,"日期"),h("input",{type:"date",value:editF.date,onChange:e=>setEditF(p=>Object.assign({},p,{date:e.target.value})),style:SM})),

          h("div",{style:Object.assign({},CARD,{marginTop:10})},
            h("div",{style:{fontSize:12,color:"var(--text2)",marginBottom:8}},"共 "+fltTxns.length+" 条"),
            !fltTxns.length&&h("div",{style:{textAlign:"center",color:"var(--text2)",padding:20,fontSize:13}},"无匹配记录"),
            grpTxns.map(g=>h("div",{key:g.date},
              h("div",{style:{display:"flex",justifyContent:"space-between",padding:"7px 0 3px",borderBottom:"0.5px solid var(--border2)"}},
                h("span",{style:{fontSize:12,fontWeight:500}},fmtDate(g.date)),
                h("div",{style:{display:"flex",gap:8,fontSize:11}},
                  g.inc>0&&h("span",{style:{color:G}},"收 "+fmtSGD(g.inc)),
                  g.exp>0&&h("span",{style:{color:R}},"支 "+fmtSGD(g.exp))
                )
              ),
              g.txns.map(t=>h(TxnRow,{key:t.id,t}))
            )),
            fltTxns.length>lim&&h("button",{onClick:()=>setLim(n=>n+100),style:{width:"100%",marginTop:10,padding:"8px",border:"0.5px solid var(--border)",borderRadius:8,background:"var(--bg2)",color:P,fontSize:13,cursor:"pointer",fontWeight:500}},"加载更多（剩余"+(fltTxns.length-lim)+"条）")
          )
        ),

        // ACCOUNTS
        page==="accounts"&&h("div",{style:{paddingBottom:16,paddingTop:10}},
          Object.entries(ACCT_LABELS).map(function(entry){
            const typ=entry[0],label=entry[1];
            const list=accts.filter(a=>a.type===typ||(typ==="liability"&&a.type==="credit"));
            if(!list.length)return null;
            const gTotal=list.reduce((s,a)=>s+toBase(bals[a.id]||0,a.currency,base,rates,mo),0);
            return h("div",{key:typ,style:CARD},
              h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:8}},
                h("span",{style:{fontSize:12,fontWeight:600,color:"var(--text2)"}},label),
                h("span",{style:{fontSize:13,fontWeight:500,color:gTotal<0?R:"var(--text)"}},h(Num,{v:(gTotal<0?"-":"")+fmtBase(Math.abs(gTotal),base),vis}))
              ),
              list.map((a,i)=>{
                const bal=bals[a.id]||0;
                return h("div",{key:a.id,style:{padding:"9px 0",borderBottom:"0.5px solid var(--border)"}},
                  h("div",{style:{display:"flex",alignItems:"center",gap:6}},
                    h("div",{style:{width:8,height:8,borderRadius:"50%",background:COLORS[i%COLORS.length],flexShrink:0}}),
                    h("div",{style:{flex:1,minWidth:0}},
                      h("div",{style:{fontSize:13}},a.name),
                      h("div",{style:{fontSize:11,color:"var(--text2)"}},(ACCT_LABELS[a.type]||a.type)+" · "+a.currency)
                    ),
                    h("div",{style:{textAlign:"right",marginRight:4,flexShrink:0}},
                      h("div",{style:{fontSize:13,fontWeight:500,color:bal<0?R:"var(--text)"}},h(Num,{v:fmtAmt(bal,a.currency),vis})),
                      a.currency!=="SGD"&&h("div",{style:{fontSize:10,color:"var(--text2)"}},"≈"+fmtSGD(toSGD(bal,a.currency,rates,mo)))
                    ),
                    h("button",{onClick:()=>{setFlt(Object.assign({},IFLT,{acctId:a.id}));setPage("txns");},style:{padding:"3px 7px",borderRadius:6,fontSize:11,border:"0.5px solid var(--border2)",background:"var(--bg2)",cursor:"pointer",color:"var(--text)",flexShrink:0}},"流水"),
                    h("button",{onClick:e=>{if(menuId===a.id){setMenuId(null);return;}const r=e.currentTarget.getBoundingClientRect();setMenuPos({top:r.bottom+4,right:window.innerWidth-r.right});setMenuId(a.id);setEditAId(null);setAdjId(null);},style:{padding:"3px 7px",borderRadius:6,fontSize:12,border:"0.5px solid var(--border2)",background:menuId===a.id?P+"15":"var(--bg2)",color:menuId===a.id?P:"var(--text)",cursor:"pointer",flexShrink:0}},"···")
                  ),
                  editAId===a.id&&h("div",{style:{marginTop:8,padding:10,background:"var(--bg2)",borderRadius:8}},
                    h("div",{style:{marginBottom:8}},h(Lbl,null,"账户名称"),h("input",{type:"text",value:editAF.name,onChange:e=>setEditAF(p=>Object.assign({},p,{name:e.target.value})),style:SM})),
                    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}},
                      h("div",null,h(Lbl,null,"类型"),h("select",{value:editAF.type,onChange:e=>setEditAF(p=>Object.assign({},p,{type:e.target.value})),style:SM},Object.entries(ACCT_LABELS).map(e=>h("option",{key:e[0],value:e[0]},e[1])))),
                      h("div",null,h(Lbl,null,"币种"),h("select",{value:editAF.currency,onChange:e=>setEditAF(p=>Object.assign({},p,{currency:e.target.value})),style:SM},["SGD","CNY","GBP","USD"].map(c=>h("option",{key:c,value:c},c))))
                    ),
                    h("div",{style:{display:"flex",gap:8}},
                      h("button",{onClick:()=>{if(!editAF.name){setEditAId(null);return;}setAccts(p=>p.map(x=>x.id===editAId?Object.assign({},x,editAF):x));setEditAId(null);},style:{flex:2,padding:"7px",border:"none",borderRadius:8,background:P,color:"white",fontSize:12,cursor:"pointer"}},"保存"),
                      h("button",{onClick:()=>setEditAId(null),style:{flex:1,padding:"7px",border:"0.5px solid var(--border)",borderRadius:8,background:"none",color:"var(--text2)",fontSize:12,cursor:"pointer"}},"取消")
                    )
                  ),
                  adjId===a.id&&h("div",{style:{marginTop:8,padding:10,background:"var(--bg2)",borderRadius:8,display:"flex",gap:8,alignItems:"flex-end"}},
                    h("div",{style:{flex:1}},
                      h("div",{style:{fontSize:11,color:"var(--text2)",marginBottom:4}},"修正后余额 ("+a.currency+")"),
                      h("input",{type:"number",value:adjVal,onChange:e=>setAdjVal(e.target.value),style:Object.assign({},IPT,{padding:"7px 10px",fontSize:13}),step:"0.01",placeholder:"输入实际余额"})
                    ),
                    h("div",{style:{display:"flex",gap:6}},
                      h("button",{onClick:()=>adjBal(a.id),style:{padding:"7px 12px",border:"none",borderRadius:8,background:P,color:"white",fontSize:12,cursor:"pointer"}},"确认"),
                      h("button",{onClick:()=>setAdjId(null),style:{padding:"7px 8px",border:"0.5px solid var(--border)",borderRadius:8,background:"none",fontSize:12,cursor:"pointer",color:"var(--text2)"}},"×")
                    )
                  )
                );
              })
            );
          }),
          h(Btn,{style:{width:"100%"},onClick:()=>nav("addAcct")},"+ 添加账户")
        ),

        // ANALYTICS
        page==="analytics"&&h("div",{style:{paddingBottom:16,paddingTop:10}},
          aTab==="cat"&&(!catBD.length
            ?h("div",{style:Object.assign({},CARD,{textAlign:"center",color:"var(--text2)",fontSize:13})},"暂无支出记录")
            :h(Fragment,null,
              h("div",{style:CARD},
                h("div",{style:{fontSize:13,fontWeight:500,marginBottom:4}},"支出分类"),
                h("div",{style:{fontSize:20,fontWeight:500,color:R,marginBottom:10}},h(Num,{v:fmtSGD(aExp),vis})),
                h(ResponsiveContainer,{width:"100%",height:140},h(PieChart,null,h(Pie,{data:catBD,cx:"50%",cy:"50%",innerRadius:38,outerRadius:60,paddingAngle:2,dataKey:"value"},catBD.map((e,i)=>h(Cell,{key:i,fill:e.color}))),h(Tooltip,{formatter:v=>"S$"+v.toFixed(2)})))
              ),
              catBD.map(c=>{
                const isExp=expCats.has(c.id);const pct=aExp>0?(c.value/aExp*100).toFixed(1):0;
                return h("div",{key:c.id,style:Object.assign({},CARD,{padding:0,overflow:"hidden"})},
                  h("div",{onClick:()=>setExpCats(p=>{const n=new Set(p);n.has(c.id)?n.delete(c.id):n.add(c.id);return n;}),style:{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",cursor:"pointer"}},
                    h("div",{style:{width:10,height:10,borderRadius:2,background:c.color,flexShrink:0}}),
                    h("div",{style:{flex:1}},h("div",{style:{fontSize:13,fontWeight:500}},c.name),h("div",{style:{width:"100%",height:3,background:"var(--bg3)",borderRadius:2,marginTop:3}},h("div",{style:{width:pct+"%",height:"100%",background:c.color,borderRadius:2}}))),
                    h("div",{style:{textAlign:"right"}},h("div",{style:{fontSize:13,fontWeight:500}},h(Num,{v:"S$"+c.value.toFixed(2),vis})),h("div",{style:{fontSize:11,color:"var(--text2)"}},pct+"%")),
                    h("span",{style:{fontSize:11,color:"var(--text2)"}},isExp?"▲":"▼")
                  ),
                  isExp&&h("div",{style:{borderTop:"0.5px solid var(--border)"}},
                    c.subArr.map(s=>{
                      const sp=c.value>0?(s.value/c.value*100).toFixed(0):0;
                      return h("div",{key:s.name,onClick:()=>{setFlt(Object.assign({},IFLT,{catId:c.id}));setPage("txns");},style:{display:"flex",alignItems:"center",gap:10,padding:"7px 14px 7px 28px",borderBottom:"0.5px solid var(--border)",cursor:"pointer",background:"var(--bg2)"}},
                        h("div",{style:{flex:1}},h("div",{style:{fontSize:12}},s.name),h("div",{style:{width:"100%",height:2,background:"var(--bg)",borderRadius:1,marginTop:2}},h("div",{style:{width:sp+"%",height:"100%",background:c.color+"88",borderRadius:1}}))),
                        h("div",{style:{fontSize:12}},h(Num,{v:"S$"+s.value.toFixed(2),vis})),
                        h("span",{style:{fontSize:10,color:P}},"→")
                      );
                    })
                  )
                );
              })
            )
          ),
          aTab==="trend"&&h(Fragment,null,
            h("div",{style:CARD},
              h("div",{style:{fontSize:13,fontWeight:500,marginBottom:10}},aRange.label+" 收支趋势"),
              h(ResponsiveContainer,{width:"100%",height:200},
                h(BarChart,{data:trendData,margin:{left:-16,bottom:0}},
                  h(XAxis,{dataKey:"month",tick:{fontSize:10}}),
                  h(YAxis,{tick:{fontSize:10},tickFormatter:v=>v>=1000?"S$"+Math.round(v/1000)+"k":"S$"+v}),
                  h(Tooltip,{formatter:v=>"S$"+v.toLocaleString()}),
                  h(Bar,{dataKey:"income",fill:G,name:"收入",radius:[3,3,0,0]}),
                  h(Bar,{dataKey:"expense",fill:R,name:"支出",radius:[3,3,0,0]}),
                  h(Legend,{iconSize:10,wrapperStyle:{fontSize:12}})
                )
              )
            ),
            h("div",{style:CARD},
              trendData.slice().reverse().filter(d=>d.income>0||d.expense>0).map((d,i)=>{
                const n=d.income-d.expense;
                return h("div",{key:i,style:{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"0.5px solid var(--border)"}},
                  h("span",{style:{fontSize:13,fontWeight:500,minWidth:46}},d.month),
                  h("div",{style:{display:"flex",gap:8,fontSize:12}},
                    h("span",{style:{color:G}},"收 ",h(Num,{v:fmtSGD(d.income),vis})),
                    h("span",{style:{color:R}},"支 ",h(Num,{v:fmtSGD(d.expense),vis})),
                    h("span",{style:{color:n>=0?G:R,fontWeight:500}},"净 ",h(Num,{v:(n>=0?"+":"")+fmtSGD(n),vis}))
                  )
                );
              })
            )
          ),
          aTab==="income"&&(()=>{
            const m={};
            aTxns.filter(t=>t.type==="income").forEach(t=>{const k=t.sub||"其他";if(!m[k])m[k]={name:k,value:0};m[k].value+=toSGD(t.amount,t.currency,rates,t.date.slice(0,7));});
            const items=Object.values(m).map(x=>Object.assign({},x,{value:+x.value.toFixed(2)})).sort((a,b)=>b.value-a.value);
            if(!items.length)return h("div",{style:Object.assign({},CARD,{textAlign:"center",color:"var(--text2)",fontSize:13})},"暂无收入记录");
            return h(Fragment,null,
              h("div",{style:CARD},
                h("div",{style:{fontSize:13,fontWeight:500,marginBottom:4}},"收入构成"),
                h("div",{style:{fontSize:20,fontWeight:500,color:G,marginBottom:10}},h(Num,{v:fmtSGD(aInc),vis})),
                h(ResponsiveContainer,{width:"100%",height:140},h(PieChart,null,h(Pie,{data:items,cx:"50%",cy:"50%",innerRadius:38,outerRadius:60,paddingAngle:2,dataKey:"value"},items.map((e,i)=>h(Cell,{key:i,fill:COLORS[i%COLORS.length]}))),h(Tooltip,{formatter:v=>"S$"+v.toFixed(2)})))
              ),
              items.map((item,i)=>{
                const pct=aInc>0?(item.value/aInc*100).toFixed(1):0;
                return h("div",{key:i,style:CARD},h("div",{style:{display:"flex",alignItems:"center",gap:10}},
                  h("div",{style:{width:10,height:10,borderRadius:"50%",background:COLORS[i%COLORS.length],flexShrink:0}}),
                  h("div",{style:{flex:1}},h("div",{style:{fontSize:13}},item.name),h("div",{style:{width:"100%",height:3,background:"var(--bg3)",borderRadius:2,marginTop:3}},h("div",{style:{width:pct+"%",height:"100%",background:COLORS[i%COLORS.length],borderRadius:2}}))),
                  h("div",{style:{textAlign:"right"}},h("div",{style:{fontSize:13,fontWeight:500}},h(Num,{v:"S$"+item.value.toFixed(2),vis})),h("div",{style:{fontSize:11,color:"var(--text2)"}},pct+"%"))
                ));
              })
            );
          })()
        ),

        // SETTINGS
        page==="settings"&&h("div",{style:{paddingBottom:16,paddingTop:10}},
          h("div",{style:CARD},
            h("div",{style:{fontSize:13,fontWeight:500,marginBottom:8}},"统计基准币种"),
            h("div",{style:{display:"flex",gap:8}},["SGD","CNY","USD","GBP"].map(c=>h("button",{key:c,onClick:()=>setBase(c),style:{flex:1,padding:"8px 4px",border:"0.5px solid "+(base===c?P:"var(--border)"),borderRadius:8,background:base===c?P:"var(--bg2)",color:base===c?"white":"var(--text)",fontSize:13,fontWeight:base===c?500:400,cursor:"pointer"}},c)))
          ),
          h("div",{style:CARD},
            h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}},
              h("div",{style:{fontSize:13,fontWeight:500}},"汇率同步 (CNY→SGD)"),
              h("button",{onClick:syncRates,style:{padding:"4px 10px",border:"0.5px solid "+P,borderRadius:20,background:P+"12",color:P,fontSize:12,cursor:"pointer"}},syncSt==="syncing"?"同步中…":syncSt==="ok"?"✓ 已同步":syncSt==="err"?"✗ 失败":"立即同步")
            ),
            h("div",{style:{fontSize:11,color:"var(--text2)",marginBottom:8}},lastSync?"上次："+lastSync:"每月自动同步"),
            Object.entries(rates).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,4).map(function(e){return h("div",{key:e[0],style:{display:"flex",justifyContent:"space-between",padding:"4px 0",fontSize:12,borderBottom:"0.5px solid var(--border)"}},h("span",{style:{color:"var(--text2)"}},e[0]),h("span",{style:{fontWeight:500}},"1 CNY = "+e[1]+" SGD"));})
          ),
          h("div",{style:CARD},
            h("div",{style:{fontSize:13,fontWeight:500,marginBottom:10}},"数据备份 / 恢复"),
            h("div",{style:{display:"flex",flexDirection:"column",gap:8}},
              h("button",{onClick:exportJSON,style:{padding:"10px",border:"0.5px solid "+P,borderRadius:9,background:P+"12",color:P,fontSize:13,fontWeight:500,cursor:"pointer"}},"↓ 导出备份 JSON"),
              h("div",null,
                h("div",{style:{fontSize:11,color:"var(--text2)",marginBottom:6}},"从备份恢复"),
                h("input",{type:"file",accept:".json",onChange:e=>{const f=e.target.files[0];if(f)restoreJSON(f);e.target.value="";},style:Object.assign({},IPT,{fontSize:12})})
              )
            )
          )
        )
      ),
      BottomBar
    ),

    // Account context menu
    menuId&&(()=>{
      const a=accts.find(x=>x.id===menuId);if(!a)return null;
      const bal=bals[a.id]||0;
      const tc=txns.filter(t=>t.acctId===a.id||t.toAcctId===a.id).length;
      return h(Fragment,null,
        h("div",{onClick:()=>setMenuId(null),style:{position:"fixed",inset:0,zIndex:9998}}),
        h("div",{style:{position:"fixed",top:menuPos.top,right:menuPos.right,background:"var(--bg)",border:"0.5px solid var(--border2)",borderRadius:12,boxShadow:"0 8px 32px rgba(0,0,0,0.25)",zIndex:9999,minWidth:130,overflow:"hidden"}},
          [
            {l:"编辑",fn:()=>{setEditAId(a.id);setEditAF({name:a.name,type:a.type,currency:a.currency});setMenuId(null);}},
            {l:"调整余额",fn:()=>{setAdjId(a.id);setAdjVal(bal.toFixed(2));setMenuId(null);}},
            {l:"删除",fn:()=>{if(tc>0){alert("有关联流水，无法删除");return;}setAccts(p=>p.filter(x=>x.id!==a.id));setMenuId(null);},danger:true,disabled:tc>0},
          ].map((item,i)=>h("button",{key:item.l,onClick:item.disabled?undefined:item.fn,style:{display:"block",width:"100%",padding:"12px 16px",border:"none",borderBottom:i<2?"0.5px solid var(--border)":"none",background:"var(--bg)",textAlign:"left",fontSize:14,color:item.disabled?"var(--border2)":item.danger?R:"var(--text)",cursor:item.disabled?"not-allowed":"pointer"}},item.l))
        )
      );
    })()
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
} // end init
</script>
</body>
</html>
