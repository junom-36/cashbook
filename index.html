// ── helpers ──────────────────────────────────────────────────────
function gid() { return Math.random().toString(36).slice(2,9); }

function getRate(rt, cur, mo) {
  if (cur === "SGD") return 1;
  if (cur === "GBP") return 1.72;
  if (cur === "USD") return 1.35;
  return rt[mo] || 0.185;
}
function toSGD(a, cur, rt, mo) { return a * getRate(rt, cur, mo); }
function toBase(a, cur, base, rt, mo) {
  var s = toSGD(a, cur, rt, mo);
  if (base === "SGD") return s;
  if (base === "CNY") return s / getRate(rt, "CNY", mo);
  if (base === "GBP") return s / 1.72;
  if (base === "USD") return s / 1.35;
  return s;
}
function fmtA(n, cur) {
  return (SYMS[cur]||"") + Math.abs(n).toLocaleString("en-SG",{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtS(n) {
  return "S$" + Math.abs(n).toLocaleString("en-SG",{minimumFractionDigits:0,maximumFractionDigits:0});
}
function fmtB(n, base) {
  return (SYMS[base]||"S$") + Math.abs(n).toLocaleString("en-SG",{minimumFractionDigits:0,maximumFractionDigits:0});
}
function fmtDt(ds) {
  var d = new Date(ds + "T00:00:00");
  return d.getFullYear() + "年" + (d.getMonth()+1) + "月" + d.getDate() + "日 " + DAYS[d.getDay()];
}
function nowDT() {
  var d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" +
    String(d.getDate()).padStart(2,"0") + "T" +
    String(d.getHours()).padStart(2,"0") + ":" + String(d.getMinutes()).padStart(2,"0");
}
function curMo() {
  var d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0");
}
function calcBal(id, txns) {
  return txns.reduce(function(s, t) {
    if (t.type === "adjust" && t.acctId === id) return s + t.amount;
    if (t.type === "transfer") {
      if (t.acctId === id) return s - t.amount;
      if (t.toAcctId === id) return s + (t.toAmount || t.amount);
      return s;
    }
    if (t.acctId === id) {
      if (t.type === "income") return s + t.amount;
      if (t.type === "expense") return s - t.amount;
    }
    return s;
  }, 0);
}
function findCat(id) { return CATS.filter(function(c){return c.id===id;})[0]; }
function findICat(id) { return ICATS.filter(function(c){return c.id===id;})[0]; }
function findAcct(list, id) { return list.filter(function(a){return a.id===id;})[0]; }

function detectCur(name) {
  var n = (name||"").toUpperCase();
  if (n.indexOf("英镑")>=0 || n.indexOf("GBP")>=0) return "GBP";
  if (n.indexOf("USD")>=0 || n.indexOf("美元")>=0) return "USD";
  for (var i=0; i<SG_KEYS.length; i++) { if (n.indexOf(SG_KEYS[i])>=0) return "SGD"; }
  if (n.indexOf("SG ")===0) return "SGD";
  return "CNY";
}
function guessType(name) {
  var n = (name||"").toLowerCase();
  if (n.indexOf("投资-")===0||n.indexOf("投资_")===0) return "investment";
  if (n.indexOf("负债-")===0||n.indexOf("负债_")===0) return "liability";
  if (n.indexOf("债权-")===0||n.indexOf("债权_")===0) return "receivable";
  if (n.indexOf("虚拟账户-")===0||n.indexOf("虚拟-")===0) return "virtual";
  if (n.indexOf("信用卡")>=0||n.indexOf("credit")>=0||n.indexOf("白条")>=0||n.indexOf("花呗")>=0||n.indexOf("借呗")>=0) return "liability";
  if (n.indexOf("应收")>=0||n.indexOf("债权")>=0) return "receivable";
  if (n.indexOf("moomoo")>=0||n.indexOf("证券")>=0||n.indexOf("基金")>=0||n.indexOf("理财")>=0||n.indexOf("fullerton")>=0||n.indexOf("定期")>=0||n.indexOf("黄金")>=0) return "investment";
  if (n.indexOf("支付宝")>=0||n.indexOf("微信")>=0||n.indexOf("grab")>=0) return "virtual";
  if (n.indexOf("现金")>=0) return "cash";
  return "fund";
}
function parseCSVLine(line) {
  var res=[], cur="", inQ=false;
  for (var i=0; i<line.length; i++) {
    var ch = line[i];
    if (ch==='"') { inQ=!inQ; }
    else if (ch===','&&!inQ) { res.push(cur); cur=""; }
    else { cur+=ch; }
  }
  res.push(cur);
  return res.map(function(s){return s.trim().replace(/^"|"$/g,"");});
}
function parseCSV(text) {
  var lines = text.split('\n').filter(function(l){return l.trim();});
  if (lines.length < 2) return [];
  var hdrs = parseCSVLine(lines[0]);
  return lines.slice(1).map(function(line) {
    var vals = parseCSVLine(line);
    var obj = {};
    hdrs.forEach(function(hh,i){ obj[hh.trim()] = vals[i]||""; });
    return obj;
  }).filter(function(r){return r['交易类型']&&r['交易类型']!=='交易类型';});
}

}

function Donut(p) {
  var data = p.data, total = p.total;
  if (!data||!data.length) return null;
  var r=36, cx=55, cy=55, circ=2*Math.PI*r, cum=0;
  var slices = data.map(function(d,i) {
    var pct = total>0 ? d.value/total : 0;
    var offset = -(circ*cum - circ/4);
    var dash = circ*pct - 1;
    cum += pct;
    return h("circle",{key:i,cx:cx,cy:cy,r:r,fill:"none",stroke:d.color||CLR[i%10],strokeWidth:14,strokeDasharray:Math.max(0,dash)+" "+circ,strokeDashoffset:offset});
  });
  var legend = data.slice(0,6).map(function(d,i) {
    return h("div",{key:i,style:{display:"flex",alignItems:"center",gap:5,marginBottom:3}},
      h("div",{style:{width:7,height:7,borderRadius:2,background:d.color||CLR[i%10],flexShrink:0}}),
      h("span",{style:{fontSize:11,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:"var(--text)"}},d.name),
      h("span",{style:{fontSize:11,color:"var(--text2)",flexShrink:0}},total>0?(d.value/total*100).toFixed(0)+"%":"")
    );
  });
  return h("div",{style:{display:"flex",alignItems:"center",gap:14,padding:"4px 0"}},
    h("svg",{width:110,height:110,style:{flexShrink:0}},
      h("circle",{cx:cx,cy:cy,r:r,fill:"none",stroke:"var(--bg3)",strokeWidth:14}),
      slices
    ),
    h("div",{style:{flex:1,minWidth:0}}, legend)
  );
}

function BarChart(p) {
  var data = p.data;
  if (!data||!data.length) return null;
  var max = Math.max.apply(null, data.map(function(d){return Math.max(d.income||0,d.expense||0);}).concat([1]));
  var bars = data.map(function(d,i) {
    return h("div",{key:i,style:{display:"flex",flexDirection:"column",alignItems:"center",gap:2,minWidth:28,flex:1}},
      h("div",{style:{display:"flex",alignItems:"flex-end",gap:2,height:100}},
        h("div",{style:{width:9,borderRadius:"3px 3px 0 0",background:GG,height:Math.max(2,Math.round(d.income/max*96))+"px"}}),
        h("div",{style:{width:9,borderRadius:"3px 3px 0 0",background:RR,height:Math.max(2,Math.round(d.expense/max*96))+"px"}})
      ),
      h("div",{style:{fontSize:9,color:"var(--text2)",textAlign:"center",whiteSpace:"nowrap",marginTop:2}},d.month)
    );
  });
  return h("div",{style:{paddingTop:4}},
    h("div",{style:{display:"flex",gap:10,marginBottom:8,fontSize:11}},
      h("div",{style:{display:"flex",alignItems:"center",gap:4}}, h("div",{style:{width:8,height:8,borderRadius:2,background:GG}}), h("span",{style:{color:"var(--text2)"}},"收入")),
      h("div",{style:{display:"flex",alignItems:"center",gap:4}}, h("div",{style:{width:8,height:8,borderRadius:2,background:RR}}), h("span",{style:{color:"var(--text2)"}},"支出"))
    ),
    h("div",{style:{display:"flex",alignItems:"flex-end",gap:3,height:120,overflowX:"auto",paddingBottom:18,borderBottom:"1px solid var(--bd)"}}, bars)
  );
}

  function buildPreview() {
    var selAccts = Object.values(impMap).filter(function(a){return a.selected;});
    var selNames = {}, nameToId = {}, fromDate = impFrom+"-01";
    selAccts.forEach(function(a){ selNames[a.name]=1; });
    accts.forEach(function(a){ nameToId[a.name]=a.id; });
    selAccts.forEach(function(a){ if(!nameToId[a.name]) nameToId[a.name]=a.id; });
    var xferOut={}, xferIn={};
    impRows.forEach(function(r) {
      var id=r['关联Id'];
      if (!id) return;
      if (r['交易类型']==='转出') xferOut[id]=r;
      if (r['交易类型']==='转入') xferIn[id]=r;
    });
    var existIds={};
    txns.forEach(function(t){ existIds[t.id]=1; });
    var newTxns=[];
    impRows.forEach(function(r, idx) {
      var typ=r['交易类型'], acctName=r['账户'];
      var rawDate=(r['日期']||"").slice(0,10).replace(/\//g,"-");
      if (!rawDate||rawDate<fromDate||!selNames[acctName]) return;
      var rawAmt=parseFloat(r['金额'])||0, amount=Math.abs(rawAmt);
      if (!amount) return;
      var rc=(r['账户币种']||"").toUpperCase();
      var currency=VCURS[rc]?rc:detectCur(acctName);
      var acctId=nameToId[acctName]||"";
      var catId=CAT_MAP[r['类别']]||"other";
      var sub=r['子类别']||"";
      var isAdj=["余额变更","负债变更","债权变更"].indexOf(typ)>=0;
      var adjFlip=typ==="负债变更";
      var note=[r['项目'],r['商家'],r['备注']].filter(Boolean).join(" ").trim();
      var txnType="expense", toAcctId="", toAmount=0;
      if (typ==="支出") { txnType="expense"; }
      else if (typ==="收入") { txnType="income"; }
      else if (typ==="转出") {
        var inRow=r['关联Id']?xferIn[r['关联Id']]:null;
        if (inRow&&selNames[inRow['账户']]) {
          var tid="imp_"+r['关联Id'];
          if (existIds[tid]) return;
          existIds[tid]=1;
          newTxns.push({id:tid,date:rawDate,type:"transfer",amount:amount,currency:currency,acctId:acctId,toAcctId:nameToId[inRow['账户']]||"",toAmount:Math.abs(parseFloat(inRow['金额'])||0)||amount,catId:catId,sub:sub,note:note});
          return;
        } else { txnType="expense"; }
      } else if (typ==="转入") {
        var outRow=r['关联Id']?xferOut[r['关联Id']]:null;
        if (outRow&&selNames[outRow['账户']]) {
          var tid2="imp_"+r['关联Id'];
          if (!existIds[tid2]) {
            existIds[tid2]=1;
            newTxns.push({id:tid2,date:rawDate,type:"transfer",amount:Math.abs(parseFloat(outRow['金额'])||0)||amount,currency:currency,acctId:nameToId[outRow['账户']]||"",toAcctId:acctId,toAmount:amount,catId:catId,sub:sub,note:note});
          }
          return;
        } else { txnType="income"; }
      } else if (isAdj) { txnType="adjust"; }
      var tid3=r['关联Id']?"imp_"+r['关联Id']+"_"+typ:"imp_row_"+idx;
      if (existIds[tid3]) return;
      existIds[tid3]=1;
      newTxns.push({id:tid3,date:rawDate,type:txnType,amount:isAdj?(adjFlip?-rawAmt:rawAmt):amount,currency:currency,acctId:acctId,toAcctId:toAcctId,toAmount:toAmount,catId:catId,sub:sub,note:note});
    });
    var newAccts=selAccts.filter(function(a){return!findAcct(accts,a.id)&&!accts.filter(function(x){return x.name===a.name;}).length;}).map(function(a){return {id:a.id,name:a.name,type:a.type,currency:a.currency};});
    setImpPrev({txns:newTxns,accts:newAccts}); setImpStep("preview");
  }

            return h("button",{key:x[0],onClick:function(){setATab(x[0]);},style:{padding:"6px 12px",borderRadius:20,fontSize:12,fontWeight:500,border:"0.5px solid "+(aTab===x[0]?PP:"var(--bd)"),background:aTab===x[0]?PP:"var(--bg)",color:aTab===x[0]?"white":"var(--text)",cursor:"pointer",flexShrink:0}},x[1]);
          })
        )
      ),
      h("div",{style:{flex:1,overflowY:"auto",padding:"0 14px"}},
        page==="home"     && renderHome(),
        page==="txns"     && renderTxns(),
        page==="accounts" && renderAccounts(),
        page==="analytics"&& renderAnalytics(),
        page==="settings" && renderSettings()
      )
    ),
    BBr
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
